<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Azure Roles Explorer</title>

<link rel="stylesheet" href="styles.css" />
</head>

<body>

<h2>Azure Roles Explorer</h2>
<p>A tool for reverse lookups of actions vs. roles</p>

<div id="modeHeader"></div>

<div>
    <label><input type="radio" name="mode" value="role" checked> Role search</label>
    <label style="margin-left:20px;"><input type="radio" name="mode" value="action"> Action search</label>
</div>

<div class="toolbar">
    <input id="search" type="text" placeholder="Search roles or actions..." />
</div>

<div class="container">
    <div class="panel">
        <h3>Results</h3>
        <div id="results"></div>
    </div>

    <div class="panel">
        <h3>Details</h3>
        <div id="details">Select a result...</div>
    </div>
</div>

<script src="app.js"></script>

</body>
</html>
