<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Azure Roles Explorer</title>
<link rel="stylesheet" href="styles.css" />
<link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>

<body>
    
<div class="hero">

    <!-- TITLE -->
    <h1>Azure Roles Explorer</h1>

    <!-- SUBTITLE -->
    <p class="subtitle">
        Cross lookup of Azure roles and actions
    </p>

    <!-- SEARCHBAR -->
    <div class="searchWrapper">
        <span class="searchIcon">🔍</span>
        <input
            id="search"
            type="text"
            placeholder="Search Azure roles..."
            autocomplete="off"
        />
    </div>

    <!-- EXAMPLES -->
    <div id="examplesBar" class="examplesBar"></div>

</div>

<!-- PANEL TITLES -->
<div class="panelHeaderRow">

    <h3 id="resultsTitle">Roles</h3>

    <button id="swapBtn" class="swapBtn">⇄</button>

    <h3 id="detailsTitle">Actions</h3>

</div>

<!-- PANELS -->
<div class="container">

    <div class="panel">
        <div id="results"></div>
    </div>

    <div class="panel">
        <div id="details"></div>
    </div>

</div>

<!-- JS -->
<script src="app.js"></script>

<!-- FOOTER -->
<footer class="footer">
    <a href="https://github.com/erlwes/Azure-Roles-Explorer"
       target="_blank"
       rel="noopener noreferrer">
        GitHub-project
    </a>
</footer>

</body>
</html>
